<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>oauth2-redirect</title></head>
<body>
<script>
  'use strict';
  function run() {
    const oauth2 = window.opener && window.opener.swaggerUIRedirectOauth2;
    if (!oauth2) return window.close();

    const hash = window.location.hash ? window.location.hash.substring(1) : "";
    const query = window.location.search ? window.location.search.substring(1) : "";
    const params = new URLSearchParams(hash || query);

    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDescription = params.get("error_description");

    if (error) {
      oauth2.errCb({ message: errorDescription || error });
      return window.close();
    }

    oauth2.callback({ auth: { code, state }, redirectUrl: oauth2.redirectUrl });
    window.close();
  }
  run();
</script>
</body>
</html>
