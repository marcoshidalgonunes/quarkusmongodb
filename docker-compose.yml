services:

  api:
    container_name: quarkus-api
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      QUARKUS_PROFILE: docker  
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - lan-network

  mongo:
    container_name: bookstoredb
    image: mongo
    restart: always
    volumes:
      - mongodata:/data/db
    networks:
      - lan-network        
    ports:
      - 27017:27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongo:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  keycloak:
      image: quay.io/keycloak/keycloak:latest
      container_name: keycloak
      restart: always
      command:
        - start-dev
      environment:
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: admin
      ports:
        - 8080:8080
      networks:
        - lan-network        
      volumes:
        - keycloakdata:/opt/keycloak/data/h2
      healthcheck:
        test:
          [
            "CMD-SHELL",
            'exec 3<>/dev/tcp/localhost/8080; echo -e "GET /health/ready HTTP/1.1\nhost: localhost:8080\n" >&3; if [ $? -eq 0 ]; then echo "Healthcheck Successful";exit 0;else echo "Healthcheck Failed";exit 1;fi;'
          ]

volumes:
  mongodata:
    external: true
    name: mongodata
  keycloakdata:
    external: true
    name: keycloakdata

networks:
  lan-network:
    driver: bridge